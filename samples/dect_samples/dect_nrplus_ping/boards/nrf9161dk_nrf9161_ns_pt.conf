# PT role configuration for nrf9161dk hardware
CONFIG_DECT_MAC_ROLE_IS_PT=y
CONFIG_DECT_MAC_ROLE_IS_FT=n
CONFIG_DECT_MAC_ROLE_IS_FT_PT=n

# Modem library
CONFIG_NRF_MODEM_LIB=y

# Disable security for this test
CONFIG_DECT_MAC_SECURITY_ENABLE=n
CONFIG_DECT_CVG_SECURITY_ENABLE=n 

