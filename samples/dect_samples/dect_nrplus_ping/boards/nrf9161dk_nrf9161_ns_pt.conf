# PT role configuration for nrf9161dk hardware
CONFIG_DECT_MAC_ROLE_IS_PT=y
CONFIG_DECT_MAC_ROLE_IS_FT=n
CONFIG_DECT_MAC_ROLE_IS_FT_PT=n

# nRF Modem Library Configuration (nRF9161 hardware only)
CONFIG_NRF_MODEM_LIB=y
CONFIG_MODEM_ANTENNA=n
CONFIG_NRF_MODEM_LINK_BINARY_DECT_PHY=y
CONFIG_HWINFO=y

# CONFIG_NRF_MODEM_LIB_ON_FAULT_APPLICATION_SPECIFIC=y
CONFIG_NRF_MODEM_LIB_SHMEM_RX_SIZE=6144
CONFIG_NRF_MODEM_LIB_SHMEM_TX_SIZE=15360

# Disable LTE to avoid radio coexistence conflicts
CONFIG_LTE_LINK_CONTROL=n

# Disable security for this test
CONFIG_DECT_MAC_SECURITY_ENABLE=n
CONFIG_DECT_CVG_SECURITY_ENABLE=n 

# Debugging HardFault: Increase TF-M and Main stack sizes
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Enable Security
# CONFIG_DECT_MAC_SECURITY_ENABLE=y
# CONFIG_DECT_CVG_SECURITY_ENABLE=y

