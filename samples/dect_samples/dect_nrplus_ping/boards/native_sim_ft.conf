# Overlay for native_sim/native/64 with FT role  
# Disables hardware-specific features for simulation

# Disable nRF Modem Library (not available on native_sim)
CONFIG_NRF_MODEM_LIB=n

# Disable hardware security (MBEDTLS requires NRF_SECURITY on nRF platforms)
CONFIG_DECT_MAC_SECURITY_ENABLE=n
CONFIG_DECT_CVG_SECURITY_ENABLE=n

# Disable NVS/Flash (requires real hardware)
CONFIG_NVS=n
CONFIG_ZMS=n
CONFIG_FLASH=n
CONFIG_FLASH_MAP=n
CONFIG_PARTITION_MANAGER_ENABLED=n

# Set FT role
CONFIG_DECT_MAC_ROLE_IS_PT=n
CONFIG_DECT_MAC_ROLE_IS_FT=y  
CONFIG_DECT_MAC_ROLE_IS_FT_PT=n

# Use test random generator for entropy
CONFIG_TEST_RANDOM_GENERATOR=y