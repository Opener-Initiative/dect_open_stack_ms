# /* boards/native_sim_64.conf */
CONFIG_TEST_USERSPACE=n
CONFIG_DECT_MAC_SEND_MOCK_API=y

# System clock for native_sim
CONFIG_SYS_CLOCK_EXISTS=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=691200

# Disable Nordic-specific Hardware Security for the simulator
CONFIG_NRF_SECURITY=n

# Entropy & Random Number Generator (Required by native_sim)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y