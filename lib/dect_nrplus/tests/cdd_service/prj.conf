
CONFIG_ZTEST=y
CONFIG_LOG=y
CONFIG_NETWORKING=y
CONFIG_DECT_NRPLUS_STACK=y
CONFIG_NET_L2_DECT_NRPLUS=y
CONFIG_NET_6LO=y
CONFIG_NET_L2_6LO_DECT_NRPLUS=y

CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV6_PREFIX="2001:db8:cafe::"

# Enable all stack logs for debugging
CONFIG_DECT_NRPLUS_LOG_LEVEL=4
CONFIG_DECT_CVG_LOG_LEVEL=4
CONFIG_DECT_DLC_LOG_LEVEL=4
CONFIG_DECT_MAC_API_LOG_LEVEL=4
CONFIG_DECT_MAC_CORE_LOG_LEVEL=4
CONFIG_DECT_MAC_PDU_LOG_LEVEL=4
CONFIG_DECT_MAC_SM_FT_LOG_LEVEL=4
CONFIG_DECT_MAC_SM_PT_LOG_LEVEL=4
CONFIG_DECT_CDD_LOG_LEVEL=4

# Required for dect_cdd response allocation
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Required for dect_mac_nvs (ZMS)
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_ZMS=y