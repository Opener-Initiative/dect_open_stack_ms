# /* boards/native_sim_64.conf */
CONFIG_TEST_USERSPACE=n
CONFIG_DECT_MAC_SEND_MOCK_API=y

# System clock for native_sim (1μs resolution)
CONFIG_SYS_CLOCK_EXISTS=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000000

# 1. Disable Nordic-specific Hardware Security
CONFIG_NRF_SECURITY=n

# Required algorithms and key types
CONFIG_PSA_WANT_ALG_CMAC=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y

# mbedTLS backend (for native sim)
CONFIG_MBEDTLS=y
# CONFIG_MBEDTLS_AES_C=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
# CONFIG_MBEDTLS_CMAC_C=y
# CONFIG_MBEDTLS_CIPHER_MODE_CTR=y

# 2. Configure vanilla Mbed TLS for the simulator
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_CFG_FILE="config-tls-generic.h"

# 3. Inject your custom AES/CMAC configs directly into Mbed TLS
CONFIG_MBEDTLS_USER_CONFIG_ENABLE=y
CONFIG_MBEDTLS_USER_CONFIG_FILE="mbedtls_native_sim_config.h"

# 4. Entropy & Random Number Generator (Required by native_sim)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y